<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Almacén — Inicio</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&family=IBM+Plex+Mono:wght@400;500&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --bg: #1b1d1f;
    --bg-panel: #232629;
    --bg-panel-hover: #292c30;
    --line: #34383c;
    --text: #ece8e0;
    --text-dim: #9a9d9f;
    --amber: #e8934a; --amber-dim: #6b5138;
    --blue: #5b8dee; --blue-dim: #2d4270;
    --violet: #a172e0; --violet-dim: #3d2f52;
    --warn: #d9634a;
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  body{background:var(--bg); color:var(--text); font-family:'Inter', sans-serif; min-height:100vh;}
  header{border-bottom:1px solid var(--line); padding:22px 28px; display:flex; align-items:center; justify-content:space-between; flex-wrap:wrap; gap:12px;}
  .brand{font-family:'Space Grotesk', sans-serif; font-weight:700; font-size:22px;}
  .brand span{color:var(--amber);}
  .header-right{display:flex; align-items:center; gap:10px;}
  .empresa-tag{font-family:'IBM Plex Mono', monospace; font-size:12px; color:var(--text-dim); border:1px solid var(--line); padding:4px 10px; border-radius:3px;}
  .btn-logout{background:none; border:1px solid var(--line); color:var(--text-dim); padding:6px 12px; border-radius:4px; font-size:12px; cursor:pointer;}
  .btn-logout:hover{color:var(--text); border-color:var(--text-dim);}

  main{max-width:920px; margin:0 auto; padding:48px 28px;}
  .saludo{margin-bottom:6px; font-family:'Space Grotesk', sans-serif; font-size:22px;}
  .saludo-sub{color:var(--text-dim); font-size:14px; margin-bottom:32px;}

  .grid-modulos{display:grid; grid-template-columns:repeat(auto-fill, minmax(220px, 1fr)); gap:18px;}
  .card-modulo{
    background:var(--bg-panel); border:1px solid var(--line); border-radius:10px;
    padding:24px; text-decoration:none; color:var(--text); display:block;
    transition:border-color 0.15s, transform 0.15s;
  }
  .card-modulo:hover{transform:translateY(-2px);}
  .card-modulo.amber:hover{border-color:var(--amber);}
  .card-modulo.blue:hover{border-color:var(--blue);}
  .card-modulo.violet:hover{border-color:var(--violet);}

  .card-icono{width:40px; height:40px; border-radius:8px; display:flex; align-items:center; justify-content:center; font-size:20px; margin-bottom:16px;}
  .card-icono.amber{background:rgba(232,147,74,0.12); color:var(--amber);}
  .card-icono.blue{background:rgba(91,141,238,0.12); color:var(--blue);}
  .card-icono.violet{background:rgba(161,114,224,0.12); color:var(--violet);}

  .card-titulo{font-family:'Space Grotesk', sans-serif; font-size:17px; font-weight:700; margin-bottom:6px;}
  .card-desc{font-size:13px; color:var(--text-dim); line-height:1.5;}

  .estado-vacio{text-align:center; padding:60px 20px; color:var(--text-dim);}

  .login-screen{min-height:100vh; display:flex; align-items:center; justify-content:center; padding:20px;}
  .login-box{background:var(--bg-panel); border:1px solid var(--line); border-radius:8px; padding:36px; width:100%; max-width:380px;}
  .login-sub{color:var(--text-dim); font-size:13px; margin-bottom:24px;}
  .form-row{margin-bottom:14px; display:flex; flex-direction:column; gap:6px;}
  .form-row label{font-size:12px; color:var(--text-dim); text-transform:uppercase;}
  .form-row input{background:var(--bg); border:1px solid var(--line); color:var(--text); padding:10px 12px; border-radius:4px; font-family:'Inter', sans-serif; font-size:14px; width:100%; box-sizing:border-box;}
  .form-row input:focus{outline:none; border-color:var(--amber-dim);}
  .form-error{background:rgba(217,99,74,0.1); border:1px solid var(--warn); color:var(--warn); padding:10px 12px; border-radius:4px; font-size:13px; margin-bottom:14px;}
  .btn-primary{background:var(--amber); color:#1b1d1f; border:none; padding:12px; border-radius:4px; font-weight:700; font-size:14px; cursor:pointer; width:100%;}
  .btn-primary:hover{background:#f0a563;}
</style>
</head>
<body>

<div id="loginScreen" class="login-screen">
  <div class="login-box">
    <div class="brand">almacén<span>·</span>inventario</div>
    <div class="login-sub">Iniciá sesión para continuar</div>
    <form id="formLogin">
      <div class="form-row">
        <label>Correo</label>
        <input type="email" id="loginEmail" required placeholder="tu@empresa.com" autocomplete="username">
      </div>
      <div class="form-row">
        <label>Contraseña</label>
        <input type="password" id="loginPassword" required placeholder="••••••••" autocomplete="current-password">
      </div>
      <div id="loginError" class="form-error" style="display:none"></div>
      <button type="submit" class="btn-primary">Ingresar</button>
    </form>
  </div>
</div>

<div id="appScreen" style="display:none">
  <header>
    <div class="brand">almacén<span>·</span>inventario</div>
    <div class="header-right">
      <div class="empresa-tag" id="empresaTag">cargando…</div>
      <button id="btnLogout" class="btn-logout">Salir</button>
    </div>
  </header>

  <main>
    <div class="saludo" id="saludo">Hola</div>
    <div class="saludo-sub">Elegí un módulo para continuar</div>
    <div class="grid-modulos" id="gridModulos"></div>
  </main>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
  const SUPABASE_URL = 'https://pgjwerbixkbbyqamsicp.supabase.co';
  const SUPABASE_KEY = 'sb_publishable_36d4hftRPT8XEoOR7Vm-Rw_TBQAkMBy';
  const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

  // Catálogo de módulos disponibles en el producto (se amplía a futuro)
  const MODULOS = [
    { clave: 'inventario', titulo: 'Inventario', desc: 'Catálogo, stock y productos', color: 'amber', icono: '📦', link: 'inventario.html' },
    { clave: 'ventas',     titulo: 'Ventas · POS', desc: 'Carrito, cobro, recibos y reportes', color: 'blue', icono: '🧾', link: 'ventas.html' },
    { clave: 'credito',    titulo: 'Crédito', desc: 'Clientes, saldos y abonos', color: 'violet', icono: '💳', link: 'credito.html' }
  ];

  const loginScreen = document.getElementById('loginScreen');
  const appScreen = document.getElementById('appScreen');

  async function iniciarSesionSiExiste(){
    const { data: { session } } = await sb.auth.getSession();
    if (session) await entrarConUsuario(session.user);
  }

  async function entrarConUsuario(authUser){
    const { data: usuario, error } = await sb
      .from('usuarios')
      .select('*, empresas(nombre, rubro)')
      .eq('auth_user_id', authUser.id)
      .single();

    if (error || !usuario){
      document.getElementById('loginError').textContent = 'Esta cuenta no está vinculada a ninguna empresa.';
      document.getElementById('loginError').style.display = 'block';
      await sb.auth.signOut();
      return;
    }

    // Módulos que la EMPRESA tiene activos (contratados)
    const { data: config } = await sb
      .from('empresa_config')
      .select('modulos_activos')
      .eq('empresa_id', usuario.empresa_id)
      .single();
    const modulosActivosEmpresa = config?.modulos_activos || [];

    // Módulos que el ROL del usuario puede ver
    const { data: permisos } = await sb
      .from('permisos_modulo')
      .select('modulo, puede_ver')
      .eq('rol_id', usuario.rol_id);
    const modulosVisiblesRol = (permisos || []).filter(p => p.puede_ver).map(p => p.modulo);

    const modulosDisponibles = MODULOS.filter(m =>
      modulosActivosEmpresa.includes(m.clave) && modulosVisiblesRol.includes(m.clave)
    );

    loginScreen.style.display = 'none';
    appScreen.style.display = 'block';
    document.getElementById('empresaTag').textContent = `${usuario.empresas.nombre} · ${usuario.nombre_completo}`;
    document.getElementById('saludo').textContent = `Hola, ${usuario.nombre_completo.split(' ')[0]}`;

    const grid = document.getElementById('gridModulos');
    if (modulosDisponibles.length === 0){
      grid.innerHTML = '<div class="estado-vacio">Tu usuario no tiene módulos habilitados todavía. Contactá al administrador de tu cuenta.</div>';
    } else {
      grid.innerHTML = modulosDisponibles.map(m => `
        <a class="card-modulo ${m.color}" href="${m.link}">
          <div class="card-icono ${m.color}">${m.icono}</div>
          <div class="card-titulo">${m.titulo}</div>
          <div class="card-desc">${m.desc}</div>
        </a>
      `).join('');
    }
  }

  document.getElementById('formLogin').addEventListener('submit', async (e) => {
    e.preventDefault();
    const loginError = document.getElementById('loginError');
    loginError.style.display = 'none';
    const email = document.getElementById('loginEmail').value.trim();
    const password = document.getElementById('loginPassword').value;
    const { data, error } = await sb.auth.signInWithPassword({ email, password });
    if (error){
      loginError.textContent = 'Correo o contraseña incorrectos.';
      loginError.style.display = 'block';
      return;
    }
    await entrarConUsuario(data.user);
  });

  document.getElementById('btnLogout').addEventListener('click', async () => {
    await sb.auth.signOut();
    location.reload();
  });

  iniciarSesionSiExiste();
</script>

</body>
</html>
