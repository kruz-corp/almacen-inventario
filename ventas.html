<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ventas — POS</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&family=IBM+Plex+Mono:wght@400;500&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --bg: #1b1d1f;
    --bg-panel: #232629;
    --bg-panel-hover: #292c30;
    --line: #34383c;
    --text: #ece8e0;
    --text-dim: #9a9d9f;
    --blue: #5b8dee;
    --blue-dim: #2d4270;
    --ok: #7fb069;
    --warn: #d9634a;
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  body{background:var(--bg); color:var(--text); font-family:'Inter', sans-serif; min-height:100vh;}
  header{
    border-bottom:1px solid var(--line);
    padding:20px 28px;
    display:flex; align-items:center; justify-content:space-between;
    flex-wrap:wrap; gap:12px;
  }
  .brand{font-family:'Space Grotesk', sans-serif; font-weight:700; font-size:22px;}
  .brand span{color:var(--blue);}
  .header-right{display:flex; align-items:center; gap:10px;}
  .empresa-tag{
    font-family:'IBM Plex Mono', monospace; font-size:12px; color:var(--text-dim);
    border:1px solid var(--line); padding:4px 10px; border-radius:3px;
  }
  .btn-logout{background:none; border:1px solid var(--line); color:var(--text-dim); padding:6px 12px; border-radius:4px; font-size:12px; cursor:pointer;}
  .btn-logout:hover{color:var(--text); border-color:var(--text-dim);}

  main{max-width:1200px; margin:0 auto; padding:24px 28px; display:grid; grid-template-columns:1.3fr 1fr; gap:24px;}
  @media (max-width: 880px){ main{grid-template-columns:1fr;} }

  .panel{background:var(--bg-panel); border:1px solid var(--line); border-radius:8px; padding:20px;}
  .panel h2{font-family:'Space Grotesk', sans-serif; font-size:16px; margin-bottom:14px;}

  input, select{
    background:var(--bg); border:1px solid var(--line); color:var(--text);
    padding:10px 12px; border-radius:4px; font-family:'Inter', sans-serif; font-size:14px; width:100%;
  }
  input:focus, select:focus{outline:none; border-color:var(--blue-dim);}

  .lista-productos{max-height:400px; overflow-y:auto; margin-top:12px;}
  .item-producto{
    display:flex; justify-content:space-between; align-items:center;
    padding:10px 8px; border-bottom:1px solid var(--line); font-size:13px; gap:10px;
  }
  .item-producto:hover{background:var(--bg-panel-hover);}
  .item-producto .info{flex:1; min-width:0;}
  .item-producto .nombre{font-weight:500;}
  .item-producto .meta{color:var(--text-dim); font-size:11px; font-family:'IBM Plex Mono', monospace;}
  .btn-agregar{
    background:var(--blue); color:#101215; border:none; padding:6px 12px; border-radius:4px;
    font-size:12px; font-weight:600; cursor:pointer; white-space:nowrap;
  }
  .btn-agregar:hover{background:#7ba1f2;}
  .btn-agregar:disabled{background:var(--line); color:var(--text-dim); cursor:default;}

  table{width:100%; border-collapse:collapse; font-size:13px;}
  th{text-align:left; color:var(--text-dim); font-weight:500; padding:8px 6px; border-bottom:1px solid var(--line); font-size:11px; text-transform:uppercase;}
  td{padding:8px 6px; border-bottom:1px solid var(--line); vertical-align:middle;}

  .carrito-cant{display:flex; align-items:center; gap:6px;}
  .btn-cant{
    background:var(--bg); border:1px solid var(--line); color:var(--text);
    width:22px; height:22px; border-radius:4px; cursor:pointer; font-size:13px; line-height:1;
  }
  .btn-cant:hover{border-color:var(--blue-dim); color:var(--blue);}
  .btn-quitar{background:none; border:none; color:var(--warn); cursor:pointer; font-size:14px;}

  .total-row{
    display:flex; justify-content:space-between; align-items:baseline;
    padding:16px 0 6px; border-top:1px solid var(--line); margin-top:10px;
  }
  .total-row .label{color:var(--text-dim); font-size:13px;}
  .total-row .num{font-family:'Space Grotesk', sans-serif; font-weight:700; font-size:26px; color:var(--blue);}

  .form-row{margin:12px 0 0; display:flex; flex-direction:column; gap:6px;}
  .form-row label{font-size:11px; color:var(--text-dim); text-transform:uppercase;}

  .btn-cobrar{
    width:100%; margin-top:16px; background:var(--blue); color:#101215; border:none;
    padding:14px; border-radius:6px; font-family:'Inter', sans-serif; font-weight:700; font-size:15px; cursor:pointer;
  }
  .btn-cobrar:hover{background:#7ba1f2;}
  .btn-cobrar:disabled{background:var(--line); color:var(--text-dim); cursor:default;}

  .stats{display:flex; gap:14px; margin-bottom:20px; flex-wrap:wrap;}
  .stat{background:var(--bg-panel); border:1px solid var(--line); border-radius:6px; padding:14px 18px; min-width:130px;}
  .stat .num{font-family:'Space Grotesk', sans-serif; font-size:24px; font-weight:700; color:var(--blue);}
  .stat .label{font-size:12px; color:var(--text-dim); margin-top:2px;}

  .estado-badge{font-size:11px; padding:2px 8px; border-radius:20px;}
  .estado-badge.completada{background:rgba(127,176,105,0.12); color:var(--ok);}
  .estado-badge.anulada{background:rgba(217,99,74,0.12); color:var(--warn); text-decoration:line-through;}
  .btn-anular{background:none; border:1px solid var(--warn); color:var(--warn); padding:4px 10px; border-radius:4px; font-size:11px; cursor:pointer;}
  .btn-anular:hover{background:rgba(217,99,74,0.1);}

  .vacio{text-align:center; color:var(--text-dim); padding:30px 10px; font-size:13px;}

  /* ── login / bloqueos ── */
  .login-screen{min-height:100vh; display:flex; align-items:center; justify-content:center; padding:20px;}
  .login-box{background:var(--bg-panel); border:1px solid var(--line); border-radius:8px; padding:36px; width:100%; max-width:380px;}
  .login-sub{color:var(--text-dim); font-size:13px; margin-bottom:24px;}
  .form-error{background:rgba(217,99,74,0.1); border:1px solid var(--warn); color:var(--warn); padding:10px 12px; border-radius:4px; font-size:13px; margin:14px 0;}
  .btn-primary{background:var(--blue); color:#101215; border:none; padding:12px; border-radius:4px; font-weight:700; font-size:14px; cursor:pointer; width:100%;}
  .btn-primary:hover{background:#7ba1f2;}
</style>
</head>
<body>

<div id="loginScreen" class="login-screen">
  <div class="login-box">
    <div class="brand">ventas<span>·</span>pos</div>
    <div class="login-sub">Iniciá sesión para registrar ventas</div>
    <form id="formLogin">
      <div class="form-row">
        <label>Correo</label>
        <input type="email" id="loginEmail" required placeholder="tu@empresa.com" autocomplete="username">
      </div>
      <div class="form-row">
        <label>Contraseña</label>
        <input type="password" id="loginPassword" required placeholder="••••••••" autocomplete="current-password">
      </div>
      <div id="loginError" class="form-error" style="display:none"></div>
      <button type="submit" class="btn-primary" style="margin-top:14px">Ingresar</button>
    </form>
  </div>
</div>

<div id="sinAccesoScreen" class="login-screen" style="display:none">
  <div class="login-box">
    <div class="brand">ventas<span>·</span>pos</div>
    <div class="login-sub">Tu rol no tiene acceso al módulo de ventas.</div>
    <button id="btnLogoutSinAcceso" class="btn-primary">Cerrar sesión</button>
  </div>
</div>

<div id="appScreen" style="display:none">

<header>
  <div class="brand">ventas<span>·</span>pos</div>
  <div class="header-right">
    <div class="empresa-tag" id="empresaTag">cargando…</div>
    <button id="btnLogout" class="btn-logout">Salir</button>
  </div>
</header>

<main>
  <!-- ── Columna izquierda: buscar productos + historial ── -->
  <div>
    <div class="panel">
      <h2>Buscar producto</h2>
      <input type="text" id="buscadorProducto" placeholder="Nombre o código…">
      <div class="lista-productos" id="listaProductos"></div>
    </div>

    <div class="panel" style="margin-top:20px">
      <h2>Ventas de hoy</h2>
      <div class="stats" id="statsHoy"></div>
      <table>
        <thead><tr><th>Hora</th><th>Cliente</th><th style="text-align:right">Total</th><th>Estado</th><th></th></tr></thead>
        <tbody id="historialBody"><tr><td colspan="5" class="vacio">Cargando…</td></tr></tbody>
      </table>
    </div>
  </div>

  <!-- ── Columna derecha: carrito ── -->
  <div class="panel" style="height:fit-content">
    <h2>Carrito</h2>
    <table>
      <thead><tr><th>Producto</th><th>Cant.</th><th style="text-align:right">Subtotal</th><th></th></tr></thead>
      <tbody id="carritoBody"><tr><td colspan="4" class="vacio">Agregá productos desde la izquierda</td></tr></tbody>
    </table>

    <div class="total-row">
      <span class="label">Total</span>
      <span class="num" id="totalCarrito">Bs 0.00</span>
    </div>

    <div class="form-row">
      <label>Cliente (opcional)</label>
      <input type="text" id="clienteNombre" placeholder="Nombre del cliente">
    </div>
    <div class="form-row">
      <label>Método de pago</label>
      <select id="metodoPago">
        <option value="efectivo">Efectivo</option>
        <option value="tarjeta">Tarjeta</option>
        <option value="transferencia">Transferencia</option>
        <option value="credito">Crédito</option>
      </select>
    </div>

    <div id="cobroError" class="form-error" style="display:none"></div>

    <button id="btnCobrar" class="btn-cobrar" disabled>Cobrar</button>
  </div>
</main>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
  const SUPABASE_URL = 'https://pgjwerbixkbbyqamsicp.supabase.co';
  const SUPABASE_KEY = 'sb_publishable_36d4hftRPT8XEoOR7Vm-Rw_TBQAkMBy';
  const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

  let EMPRESA_ID = null;
  let usuarioActual = null;
  let permisosActuales = { puede_ver: false, puede_editar: false, puede_eliminar: false };
  let productos = [];
  let carrito = []; // { producto_id, nombre, precio, cantidad, stockDisponible }

  const loginScreen = document.getElementById('loginScreen');
  const sinAccesoScreen = document.getElementById('sinAccesoScreen');
  const appScreen = document.getElementById('appScreen');

  async function iniciarSesionSiExiste(){
    const { data: { session } } = await sb.auth.getSession();
    if (session) await entrarConUsuario(session.user);
  }

  async function entrarConUsuario(authUser){
    const { data: usuario, error } = await sb
      .from('usuarios')
      .select('*, empresas(nombre, rubro)')
      .eq('auth_user_id', authUser.id)
      .single();

    if (error || !usuario){
      document.getElementById('loginError').textContent = 'Esta cuenta no está vinculada a ninguna empresa.';
      document.getElementById('loginError').style.display = 'block';
      await sb.auth.signOut();
      return;
    }

    usuarioActual = usuario;
    EMPRESA_ID = usuario.empresa_id;

    const { data: permiso } = await sb
      .from('permisos_modulo')
      .select('puede_ver, puede_editar, puede_eliminar')
      .eq('rol_id', usuario.rol_id)
      .eq('modulo', 'ventas')
      .maybeSingle();

    permisosActuales = permiso || { puede_ver: false, puede_editar: false, puede_eliminar: false };

    if (!permisosActuales.puede_ver){
      loginScreen.style.display = 'none';
      sinAccesoScreen.style.display = 'flex';
      return;
    }

    loginScreen.style.display = 'none';
    appScreen.style.display = 'block';
    document.getElementById('empresaTag').textContent = `${usuario.empresas.nombre} · ${usuario.nombre_completo}`;
    document.getElementById('btnCobrar').disabled = !permisosActuales.puede_editar;

    await cargarProductos();
    await cargarHistorialHoy();
  }

  document.getElementById('formLogin').addEventListener('submit', async (e) => {
    e.preventDefault();
    const loginError = document.getElementById('loginError');
    loginError.style.display = 'none';

    const email = document.getElementById('loginEmail').value.trim();
    const password = document.getElementById('loginPassword').value;
    const { data, error } = await sb.auth.signInWithPassword({ email, password });

    if (error){
      loginError.textContent = 'Correo o contraseña incorrectos.';
      loginError.style.display = 'block';
      return;
    }
    await entrarConUsuario(data.user);
  });

  document.getElementById('btnLogout').addEventListener('click', async () => { await sb.auth.signOut(); location.reload(); });
  document.getElementById('btnLogoutSinAcceso').addEventListener('click', async () => { await sb.auth.signOut(); location.reload(); });

  // ── Buscar / listar productos ────────────────────────────────────
  async function cargarProductos(){
    const { data, error } = await sb
      .from('catalogo_productos')
      .select('*')
      .eq('empresa_id', EMPRESA_ID)
      .eq('activo', true)
      .order('nombre');

    if (error){
      document.getElementById('listaProductos').innerHTML = `<div class="vacio">Error al cargar productos: ${error.message}</div>`;
      return;
    }
    productos = data;
    renderListaProductos(productos);
  }

  function renderListaProductos(lista){
    const cont = document.getElementById('listaProductos');
    if (lista.length === 0){
      cont.innerHTML = '<div class="vacio">Sin productos.</div>';
      return;
    }
    cont.innerHTML = lista.map(p => `
      <div class="item-producto">
        <div class="info">
          <div class="nombre">${p.nombre}</div>
          <div class="meta">${p.codigo || '—'} · stock: ${p.stock_actual} ${p.unidad_medida} · Bs ${Number(p.precio_venta).toFixed(2)}</div>
        </div>
        <button class="btn-agregar" onclick="agregarAlCarrito('${p.id}')" ${p.stock_actual <= 0 ? 'disabled' : ''}>
          ${p.stock_actual <= 0 ? 'Sin stock' : '+ Agregar'}
        </button>
      </div>
    `).join('');
  }

  document.getElementById('buscadorProducto').addEventListener('input', (e) => {
    const texto = e.target.value.toLowerCase();
    const filtrados = productos.filter(p =>
      p.nombre.toLowerCase().includes(texto) || (p.codigo || '').toLowerCase().includes(texto)
    );
    renderListaProductos(filtrados);
  });

  // ── Carrito ───────────────────────────────────────────────────────
  function agregarAlCarrito(productoId){
    const producto = productos.find(p => p.id === productoId);
    if (!producto || producto.stock_actual <= 0) return;

    const existente = carrito.find(i => i.producto_id === productoId);
    if (existente){
      if (existente.cantidad < producto.stock_actual) existente.cantidad += 1;
    } else {
      carrito.push({
        producto_id: producto.id,
        nombre: producto.nombre,
        precio: Number(producto.precio_venta),
        cantidad: 1,
        stockDisponible: producto.stock_actual
      });
    }
    renderCarrito();
  }

  function cambiarCantidad(productoId, delta){
    const item = carrito.find(i => i.producto_id === productoId);
    if (!item) return;
    const nuevaCantidad = item.cantidad + delta;
    if (nuevaCantidad <= 0){
      carrito = carrito.filter(i => i.producto_id !== productoId);
    } else if (nuevaCantidad <= item.stockDisponible){
      item.cantidad = nuevaCantidad;
    }
    renderCarrito();
  }

  function quitarDelCarrito(productoId){
    carrito = carrito.filter(i => i.producto_id !== productoId);
    renderCarrito();
  }

  function renderCarrito(){
    const tbody = document.getElementById('carritoBody');
    if (carrito.length === 0){
      tbody.innerHTML = '<tr><td colspan="4" class="vacio">Agregá productos desde la izquierda</td></tr>';
    } else {
      tbody.innerHTML = carrito.map(i => `
        <tr>
          <td>${i.nombre}</td>
          <td>
            <div class="carrito-cant">
              <button class="btn-cant" onclick="cambiarCantidad('${i.producto_id}', -1)">−</button>
              <span>${i.cantidad}</span>
              <button class="btn-cant" onclick="cambiarCantidad('${i.producto_id}', 1)">+</button>
            </div>
          </td>
          <td style="text-align:right">Bs ${(i.precio * i.cantidad).toFixed(2)}</td>
          <td><button class="btn-quitar" onclick="quitarDelCarrito('${i.producto_id}')">✕</button></td>
        </tr>
      `).join('');
    }

    const total = carrito.reduce((acc, i) => acc + i.precio * i.cantidad, 0);
    document.getElementById('totalCarrito').textContent = `Bs ${total.toFixed(2)}`;
    document.getElementById('btnCobrar').disabled = carrito.length === 0 || !permisosActuales.puede_editar;
  }

  // ── Cobrar ────────────────────────────────────────────────────────
  document.getElementById('btnCobrar').addEventListener('click', async () => {
    if (carrito.length === 0) return;

    const cobroError = document.getElementById('cobroError');
    cobroError.style.display = 'none';
    const btn = document.getElementById('btnCobrar');
    btn.disabled = true;
    btn.textContent = 'Procesando…';

    const total = carrito.reduce((acc, i) => acc + i.precio * i.cantidad, 0);
    const clienteNombre = document.getElementById('clienteNombre').value.trim() || null;
    const metodoPago = document.getElementById('metodoPago').value;

    try {
      // 1. Crear la venta
      const { data: venta, error: errVenta } = await sb
        .from('ventas')
        .insert({
          empresa_id: EMPRESA_ID,
          usuario_id: usuarioActual.id,
          cliente_nombre: clienteNombre,
          metodo_pago: metodoPago,
          total,
          estado: 'completada'
        })
        .select().single();
      if (errVenta) throw new Error(`Venta: ${errVenta.message}`);

      // 2. Crear los items
      const items = carrito.map(i => ({
        venta_id: venta.id,
        producto_id: i.producto_id,
        producto_nombre: i.nombre,
        precio_unitario: i.precio,
        cantidad: i.cantidad,
        subtotal: i.precio * i.cantidad
      }));
      const { error: errItems } = await sb.from('venta_items').insert(items);
      if (errItems) throw new Error(`Items: ${errItems.message}`);

      // 3. Descontar stock de cada producto
      for (const i of carrito){
        const producto = productos.find(p => p.id === i.producto_id);
        const nuevoStock = Math.max(0, producto.stock_actual - i.cantidad);
        const { error: errStock } = await sb
          .from('catalogo_productos')
          .update({ stock_actual: nuevoStock })
          .eq('id', i.producto_id);
        if (errStock) throw new Error(`Stock de "${i.nombre}": ${errStock.message}`);
        producto.stock_actual = nuevoStock;
      }

      // 4. Limpiar carrito y refrescar
      carrito = [];
      document.getElementById('clienteNombre').value = '';
      renderCarrito();
      renderListaProductos(productos);
      await cargarHistorialHoy();

    } catch (err){
      cobroError.textContent = `No se pudo completar la venta: ${err.message}`;
      cobroError.style.display = 'block';
    }

    btn.disabled = carrito.length === 0;
    btn.textContent = 'Cobrar';
  });

  // ── Historial de hoy ────────────────────────────────────────────
  async function cargarHistorialHoy(){
    const inicioHoy = new Date();
    inicioHoy.setHours(0, 0, 0, 0);

    const { data, error } = await sb
      .from('ventas')
      .select('*')
      .eq('empresa_id', EMPRESA_ID)
      .gte('created_at', inicioHoy.toISOString())
      .order('created_at', { ascending: false });

    const tbody = document.getElementById('historialBody');
    if (error){
      tbody.innerHTML = `<tr><td colspan="5" class="vacio">Error: ${error.message}</td></tr>`;
      return;
    }

    if (!data || data.length === 0){
      tbody.innerHTML = '<tr><td colspan="5" class="vacio">Todavía no hay ventas hoy.</td></tr>';
    } else {
      tbody.innerHTML = data.map(v => `
        <tr>
          <td>${new Date(v.created_at).toLocaleTimeString('es-BO', { hour: '2-digit', minute: '2-digit' })}</td>
          <td>${v.cliente_nombre || '—'}</td>
          <td style="text-align:right">Bs ${Number(v.total).toFixed(2)}</td>
          <td><span class="estado-badge ${v.estado}">${v.estado}</span></td>
          <td>${(v.estado === 'completada' && permisosActuales.puede_eliminar)
            ? `<button class="btn-anular" onclick="anularVenta('${v.id}')">Anular</button>` : ''}</td>
        </tr>
      `).join('');
    }

    const ventasValidas = (data || []).filter(v => v.estado === 'completada');
    const totalHoy = ventasValidas.reduce((acc, v) => acc + Number(v.total), 0);
    document.getElementById('statsHoy').innerHTML = `
      <div class="stat"><div class="num">${ventasValidas.length}</div><div class="label">ventas hoy</div></div>
      <div class="stat"><div class="num">Bs ${totalHoy.toLocaleString('es-BO', { maximumFractionDigits: 0 })}</div><div class="label">total vendido</div></div>
    `;
  }

  async function anularVenta(ventaId){
    const confirmado = confirm('¿Anular esta venta? El stock de los productos se va a devolver al inventario.');
    if (!confirmado) return;

    // 1. Traer los items de la venta para devolver el stock
    const { data: items, error: errItems } = await sb
      .from('venta_items')
      .select('producto_id, cantidad')
      .eq('venta_id', ventaId);

    if (errItems){
      alert(`No se pudo leer la venta: ${errItems.message}`);
      return;
    }

    // 2. Devolver stock de cada producto
    for (const item of items){
      const { data: prod, error: errGet } = await sb
        .from('catalogo_productos')
        .select('stock_actual')
        .eq('id', item.producto_id)
        .single();
      if (errGet || !prod) continue; // si el producto fue borrado, seguimos igual
      await sb
        .from('catalogo_productos')
        .update({ stock_actual: prod.stock_actual + item.cantidad })
        .eq('id', item.producto_id);
    }

    // 3. Marcar la venta como anulada
    const { error: errAnular } = await sb
      .from('ventas')
      .update({ estado: 'anulada' })
      .eq('id', ventaId);

    if (errAnular){
      alert(`No se pudo anular: ${errAnular.message}`);
      return;
    }

    await cargarProductos();
    await cargarHistorialHoy();
  }

  iniciarSesionSiExiste();
</script>
